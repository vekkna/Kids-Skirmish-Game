<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Table Troops Playtest</title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: #fffaf3;
      --ink: #1b1f2a;
      --line: #d7cbb9;
      --a: #e4572e;
      --b: #2e86ab;
      --good: #2f9e44;
      --warn: #d9480f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 600px at 10% -20%, #fffdf8 5%, transparent 55%),
        radial-gradient(800px 500px at 100% 0%, #efe8db 10%, transparent 60%),
        var(--bg);
    }

    .app {
      display: grid;
      grid-template-columns: minmax(280px, 350px) 1fr;
      gap: 16px;
      min-height: 100vh;
      padding: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.25rem;
    }

    h2 {
      margin: 14px 0 8px;
      font-size: 1rem;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .dice-buttons {
      margin-top: 6px;
    }

    .dice-buttons button {
      flex: 1;
      min-width: 100px;
      padding: 12px 10px;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .builder {
      margin-top: 12px;
    }

    .builder h2 {
      margin-bottom: 6px;
    }

    .builder .terrain-tray {
      margin-top: 0;
      min-height: 54px;
    }

    .builder .terrain-chip {
      width: 64px;
      height: 40px;
      border-style: solid;
    }

    .legacy-controls {
      display: none;
    }

    button, select, input {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      background: #fff;
      cursor: pointer;
    }

    button:hover { border-color: #bcae97; }
    button.primary { background: #fff7ec; border-color: #e9d2ae; }

    .pill {
      border-radius: 999px;
      padding: 4px 10px;
      border: 1px solid var(--line);
      font-size: 0.9rem;
    }

    .team-a { background: color-mix(in srgb, var(--a) 18%, white); border-color: color-mix(in srgb, var(--a) 50%, white); }
    .team-b { background: color-mix(in srgb, var(--b) 18%, white); border-color: color-mix(in srgb, var(--b) 50%, white); }

    .board-wrap {
      display: grid;
      place-items: center;
      min-height: 0;
    }

    .board {
      width: min(86vmin, 900px);
      aspect-ratio: 1;
      position: relative;
      border: 2px solid #8f8069;
      border-radius: 14px;
      background:
        linear-gradient(90deg, rgba(0,0,0,.06) 1px, transparent 1px) 0 0 / 8.333% 8.333%,
        linear-gradient(0deg, rgba(0,0,0,.06) 1px, transparent 1px) 0 0 / 8.333% 8.333%,
        linear-gradient(180deg, #efe7d8, #e4dbc9);
      overflow: hidden;
      touch-action: none;
    }

    .edge {
      position: absolute;
      left: 0;
      width: 100%;
      height: 8%;
      pointer-events: none;
      opacity: .25;
    }

    .edge.top { top: 0; background: var(--b); }
    .edge.bottom { bottom: 0; background: var(--a); }
    .los-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      overflow: visible;
    }
    .move-readout {
      position: absolute;
      left: 0;
      top: 0;
      transform: translate(-50%, 30%);
      z-index: 3;
      background: #ffffffd9;
      border: 1px solid #bfae93;
      border-radius: 8px;
      padding: 4px 8px;
      font-size: .82rem;
      font-weight: 700;
      display: none;
      pointer-events: none;
    }

    .terrain-tray {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .terrain-chip {
      width: 56px;
      height: 34px;
      border: 2px solid transparent;
      border-radius: 8px;
      display: grid;
      place-items: center;
      cursor: grab;
      user-select: none;
      font-size: .75rem;
      font-weight: 700;
    }

    .terrain-chip[data-terrain-type="Low Terrain"] {
      border-color: #8f8069;
      background: #e9e0d2;
      color: #5a503f;
    }

    .terrain-chip[data-terrain-type="High Terrain"] {
      border-color: #4f7a45;
      background: #d8e8cc;
      color: #2f4f2a;
    }

    .terrain-chip:active { cursor: grabbing; }

    .unit {
      position: absolute;
      width: 52px;
      height: 52px;
      margin-left: -26px;
      margin-top: -26px;
      border-radius: 10px;
      border: 2px solid #00000022;
      color: #1a1a1a;
      font-weight: 700;
      display: grid;
      place-items: center;
      user-select: none;
      cursor: grab;
      transition: transform .12s ease, filter .12s ease, box-shadow .12s ease;
      box-shadow: 0 3px 8px rgba(0,0,0,.16);
    }

    .unit.team-a { background: var(--a); }
    .unit.team-b { background: var(--b); }
    .unit.dragging { cursor: grabbing; filter: brightness(1.1); }
    .unit.ghost {
      pointer-events: none;
      opacity: .35;
      box-shadow: none;
      outline: 2px dashed #ffffffcc;
      outline-offset: 2px;
    }
    .unit.selected { outline: 3px solid #fff; box-shadow: 0 0 0 3px #21252955; }
    .unit.targetable {
      outline: 4px solid #38d66b;
      box-shadow: 0 0 0 4px #38d66b77, 0 0 12px #38d66b66;
    }
    .unit.blocked-target {
      outline: 4px solid #ff4d4f;
      box-shadow: 0 0 0 4px #ff4d4f77, 0 0 12px #ff4d4f66;
    }
    .unit.lying { filter: brightness(.5) saturate(.65); }
    .unit.lying .facing-arrow { opacity: .7; }
    .unit .facing-arrow {
      width: 0;
      height: 0;
      border-left: 9px solid transparent;
      border-right: 9px solid transparent;
      border-bottom: 14px solid #ffffff;
      filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.35));
      transform: translateY(-3px);
    }

    .terrain {
      position: absolute;
      border: 2px solid #726249;
      border-radius: 8px;
      box-shadow: 0 3px 8px rgba(0,0,0,.16);
      user-select: none;
      cursor: grab;
      display: grid;
      place-items: center;
      color: #4f4435;
      font-size: .72rem;
      font-weight: 700;
      overflow: visible;
    }

    .terrain[data-terrain-type="Low Terrain"],
    .terrain[data-terrain-type="Terrain"] {
      border-color: #726249;
      background: linear-gradient(135deg, #d5cab8, #bfb096);
      color: #4f4435;
    }

    .terrain[data-terrain-type="High Terrain"] {
      border-color: #4f7a45;
      background: linear-gradient(135deg, #d8e8cc, #b8d9a2);
      color: #2f4f2a;
    }

    .terrain.dragging { cursor: grabbing; filter: brightness(1.05); }
    .terrain.selected { outline: 3px solid #fff; box-shadow: 0 0 0 3px #21252955; }
    .terrain-label {
      pointer-events: none;
      background: #ffffffb8;
      border-radius: 999px;
      padding: 2px 6px;
    }
    .resize-handle {
      position: absolute;
      background: #fff;
      border: 1px solid #6b5c46;
      border-radius: 3px;
      opacity: 0;
      pointer-events: none;
      touch-action: none;
    }
    .terrain.selected .resize-handle {
      opacity: 1;
      pointer-events: auto;
    }
    .resize-handle.e,
    .resize-handle.w {
      width: 8px;
      height: 22px;
      top: calc(50% - 11px);
      cursor: ew-resize;
    }
    .resize-handle.e { right: -6px; }
    .resize-handle.w { left: -6px; }
    .resize-handle.n,
    .resize-handle.s {
      width: 22px;
      height: 8px;
      left: calc(50% - 11px);
      cursor: ns-resize;
    }
    .resize-handle.n { top: -6px; }
    .resize-handle.s { bottom: -6px; }

    .results {
      padding: 8px;
      min-height: 40px;
      border: 1px dashed var(--line);
      border-radius: 10px;
      background: #fff;
      margin-top: 8px;
      font-size: .95rem;
    }

    .dice {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .die {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid #b9ab92;
      background: #fff;
      display: grid;
      place-items: center;
      font-weight: 700;
    }

    .die.hit { border-color: var(--good); color: var(--good); }

    .log {
      margin-top: 12px;
      max-height: 180px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 8px;
      font-size: .9rem;
    }

    .log-item { margin-bottom: 6px; }

    .hint {
      font-size: .85rem;
      color: #5c5347;
    }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .board { width: min(94vw, 700px); }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <h1>Dice Roller</h1>
      <div class="row dice-buttons">
        <button id="roll1Btn" class="primary">1d6</button>
        <button id="roll2Btn" class="primary">2d6</button>
      </div>
      <div id="diceTray" class="dice"></div>
      <div class="builder">
        <h2>Terrain</h2>
        <div class="terrain-tray" id="terrainTray">
          <div class="terrain-chip" data-terrain-type="High Terrain" aria-label="High terrain block" title="Drag high terrain to board">High</div>
          <div class="terrain-chip" data-terrain-type="Low Terrain" aria-label="Low terrain block" title="Drag low terrain to board">Low</div>
        </div>
      </div>

      <div class="legacy-controls" aria-hidden="true">
        <span id="turnPill" class="pill team-a">Turn: Player A</span>
        <button id="nextTurnBtn" type="button">Next Turn</button>
        <button id="setupBtn" class="primary" type="button">Reset 5v5 Setup</button>
        <button id="clearBtn" type="button">Clear Units</button>

        <div class="terrain-tray"></div>

        <div id="selectedInfo" class="results">No unit or terrain selected.</div>
        <button id="toggleLyingBtn" type="button">Toggle Lying / Standing</button>
        <button id="deleteUnitBtn" type="button">Delete Unit</button>
        <button id="addA" type="button">Add Player A Unit</button>
        <button id="addB" type="button">Add Player B Unit</button>

        <input id="diceCount" type="number" min="1" max="10" value="1">
        <select id="hitOn">
          <option value="5">5+ (normal)</option>
          <option value="6">6 only (fire back)</option>
        </select>
        <button id="rollBtn" type="button">Roll</button>
        <button id="presetShootBtn" type="button">Preset Shoot Dice</button>
        <button id="presetHealBtn" type="button">Preset Heal Dice</button>

        <input type="checkbox" id="closeRange">
        <input type="checkbox" id="openShot">
        <input type="checkbox" id="supportFire">
        <input type="checkbox" id="hiddenHeal">
        <div class="log" id="log"></div>
      </div>
    </section>

    <section class="board-wrap">
      <div class="board panel" id="board">
        <div class="edge top"></div>
        <div class="edge bottom"></div>
        <svg id="losLayer" class="los-layer" viewBox="0 0 100 100" preserveAspectRatio="none">
          <g id="threatLayer"></g>
          <line id="losLine" x1="0" y1="0" x2="0" y2="0" stroke="#111" stroke-width="0.35" stroke-dasharray="1.2 0.8" stroke-linecap="round" visibility="hidden"></line>
        </svg>
        <div id="moveReadout" class="move-readout"></div>
      </div>
    </section>
  </main>

  <script>
    const board = document.getElementById("board");
    const logEl = document.getElementById("log");
    const selectedInfo = document.getElementById("selectedInfo");
    const turnPill = document.getElementById("turnPill");
    const terrainTray = document.getElementById("terrainTray");
    const diceCountInput = document.getElementById("diceCount");
    const hitOnSelect = document.getElementById("hitOn");
    const diceTray = document.getElementById("diceTray");
    const roll1Btn = document.getElementById("roll1Btn");
    const roll2Btn = document.getElementById("roll2Btn");
    const losLine = document.getElementById("losLine");
    const threatLayer = document.getElementById("threatLayer");
    const moveReadout = document.getElementById("moveReadout");

    let units = [];
    let terrains = [];
    let selectedId = null;
    let selectedType = "unit";
    let dragState = null;
    let resizeState = null;
    let hovered = null;
    let losState = null;
    let threatPreview = null;
    let nextUnitNumber = { A: 1, B: 1 };
    let nextTerrainId = 1;
    let currentTurn = "A";

    function log(msg) {
      const div = document.createElement("div");
      div.className = "log-item";
      const time = new Date().toLocaleTimeString();
      div.textContent = `[${time}] ${msg}`;
      logEl.prepend(div);
    }

    function clamp(n, min, max) {
      return Math.min(max, Math.max(min, n));
    }

    function createUnit(team, xPct, yPct, lying = false, rotation = null) {
      const id = `${team}${nextUnitNumber[team]++}`;
      const defaultRotation = team === "A" ? 0 : 180;
      units.push({ id, team, xPct, yPct, lying, rotation: rotation ?? defaultRotation });
      render();
      log(`Added ${team === "A" ? "Player A" : "Player B"} unit ${id}.`);
    }

    function createTerrain(type, xPct, yPct, rotation = 0, wPct = 12, hPct = 7) {
      const id = `T${nextTerrainId++}`;
      terrains.push({ id, type, xPct, yPct, rotation, wPct, hPct });
      render();
      log(`Placed terrain ${id} (${type}).`);
    }

    function seedDefaultTerrain() {
      const slots = [
        { x: 20, y: 26 }, { x: 50, y: 24 }, { x: 80, y: 26 },
        { x: 20, y: 74 }, { x: 50, y: 76 }, { x: 80, y: 74 }
      ];
      slots.forEach((slot) => {
        const x = clamp(slot.x + (Math.random() * 10 - 5), 10, 90);
        const y = clamp(slot.y + (Math.random() * 10 - 5), 10, 90);
        const rot = Math.round((Math.random() * 40) - 20);
        const w = 10 + Math.random() * 5;
        const h = 6 + Math.random() * 3;
        createTerrain("Low Terrain", x, y, rot, w, h);
      });
    }

    function setupDefault() {
      units = [];
      terrains = [];
      nextUnitNumber = { A: 1, B: 1 };
      nextTerrainId = 1;
      selectedId = null;
      selectedType = "unit";
      const cols = [14, 32, 50, 68, 86];
      cols.forEach((x, i) => {
        createUnit("A", x, 92 - (i % 2) * 3);
        createUnit("B", x, 8 + (i % 2) * 3);
      });
      seedDefaultTerrain();
      log("Reset board with 5 units per side.");
      render();
    }

    function render() {
      board.querySelectorAll(".unit, .terrain").forEach((el) => el.remove());
      const targetableEnemyIds = getThreatReachableEnemyIds();
      const blockedEnemyIds = getThreatBlockedEnemyIds();
      for (const u of units) {
        if (dragState && dragState.type === "unit" && dragState.id === u.id) {
          const ghost = document.createElement("div");
          ghost.className = `unit ghost team-${u.team.toLowerCase()}${u.lying ? " lying" : ""}`;
          ghost.style.left = `${dragState.startXPct}%`;
          ghost.style.top = `${dragState.startYPct}%`;
          ghost.style.transform = `rotate(${u.rotation}deg)`;
          ghost.innerHTML = `<span class="facing-arrow"></span>`;
          board.appendChild(ghost);
        }
        const el = document.createElement("div");
        const selected = selectedType === "unit" && u.id === selectedId;
        const targetable = targetableEnemyIds.has(u.id);
        const blocked = blockedEnemyIds.has(u.id);
        el.className = `unit team-${u.team.toLowerCase()}${u.lying ? " lying" : ""}${selected ? " selected" : ""}${targetable ? " targetable" : ""}${blocked ? " blocked-target" : ""}`;
        el.dataset.type = "unit";
        el.dataset.id = u.id;
        el.style.left = `${u.xPct}%`;
        el.style.top = `${u.yPct}%`;
        el.style.transform = `rotate(${u.rotation}deg)`;
        el.innerHTML = `<span class="facing-arrow"></span>`;
        board.appendChild(el);
      }
      for (const t of terrains) {
        const el = document.createElement("div");
        const selected = selectedType === "terrain" && t.id === selectedId;
        el.className = `terrain${selected ? " selected" : ""}`;
        el.dataset.type = "terrain";
        el.dataset.id = t.id;
        el.dataset.terrainType = t.type;
        el.style.left = `${t.xPct}%`;
        el.style.top = `${t.yPct}%`;
        el.style.width = `${t.wPct}%`;
        el.style.height = `${t.hPct}%`;
        el.style.marginLeft = `${-t.wPct / 2}%`;
        el.style.marginTop = `${-t.hPct / 2}%`;
        el.style.transform = `rotate(${t.rotation}deg)`;
        el.innerHTML = `
          <span class="terrain-label">${t.type}</span>
          <span class="resize-handle n" data-edge="n"></span>
          <span class="resize-handle e" data-edge="e"></span>
          <span class="resize-handle s" data-edge="s"></span>
          <span class="resize-handle w" data-edge="w"></span>
        `;
        board.appendChild(el);
      }
      renderThreatPreview();
      renderLos();
      updateSelectedInfo();
      updateTurnPill();
    }

    function getThreatReachableEnemyIds() {
      if (!threatPreview) return new Set();
      const source = findUnit(threatPreview.unitId);
      if (!source) return new Set();
      const reachable = new Set();
      units.forEach((u) => {
        if (u.team === source.team) return;
        if (!isShotBlocked(source, u)) reachable.add(u.id);
      });
      return reachable;
    }

    function getThreatBlockedEnemyIds() {
      if (!threatPreview) return new Set();
      const source = findUnit(threatPreview.unitId);
      if (!source) return new Set();
      const blocked = new Set();
      units.forEach((u) => {
        if (u.team === source.team) return;
        if (isShotBlocked(source, u)) blocked.add(u.id);
      });
      return blocked;
    }

    function getUnitRadiusPct() {
      const r = board.getBoundingClientRect();
      return (26 / r.width) * 100;
    }

    function pointInRect(p, halfW, halfH) {
      return p.x >= -halfW && p.x <= halfW && p.y >= -halfH && p.y <= halfH;
    }

    function orientation(a, b, c) {
      return (b.x - a.x) * (c.y - a.y) - (b.y - a.y) * (c.x - a.x);
    }

    function onSegment(a, b, p) {
      const eps = 1e-6;
      return p.x <= Math.max(a.x, b.x) + eps && p.x + eps >= Math.min(a.x, b.x) &&
        p.y <= Math.max(a.y, b.y) + eps && p.y + eps >= Math.min(a.y, b.y);
    }

    function segmentsIntersect(a, b, c, d) {
      const o1 = orientation(a, b, c);
      const o2 = orientation(a, b, d);
      const o3 = orientation(c, d, a);
      const o4 = orientation(c, d, b);
      const eps = 1e-6;

      if (((o1 > eps && o2 < -eps) || (o1 < -eps && o2 > eps)) &&
        ((o3 > eps && o4 < -eps) || (o3 < -eps && o4 > eps))) {
        return true;
      }
      if (Math.abs(o1) <= eps && onSegment(a, b, c)) return true;
      if (Math.abs(o2) <= eps && onSegment(a, b, d)) return true;
      if (Math.abs(o3) <= eps && onSegment(c, d, a)) return true;
      if (Math.abs(o4) <= eps && onSegment(c, d, b)) return true;
      return false;
    }

    function segmentIntersectsRect(a, b, halfW, halfH) {
      if (pointInRect(a, halfW, halfH) || pointInRect(b, halfW, halfH)) return true;
      const tl = { x: -halfW, y: -halfH };
      const tr = { x: halfW, y: -halfH };
      const br = { x: halfW, y: halfH };
      const bl = { x: -halfW, y: halfH };
      return segmentsIntersect(a, b, tl, tr) || segmentsIntersect(a, b, tr, br) ||
        segmentsIntersect(a, b, br, bl) || segmentsIntersect(a, b, bl, tl);
    }

    function worldPointToTerrainLocal(x, y, t) {
      const rad = (-t.rotation * Math.PI) / 180;
      const cos = Math.cos(rad);
      const sin = Math.sin(rad);
      const dx = x - t.xPct;
      const dy = y - t.yPct;
      return { x: dx * cos - dy * sin, y: dx * sin + dy * cos };
    }

    function segmentIntersectsTerrain(ax, ay, bx, by, t) {
      const a = worldPointToTerrainLocal(ax, ay, t);
      const b = worldPointToTerrainLocal(bx, by, t);
      return segmentIntersectsRect(a, b, t.wPct / 2, t.hPct / 2);
    }

    function segmentIntersectsSoldier(ax, ay, bx, by, u, radiusPct) {
      const dx = bx - ax;
      const dy = by - ay;
      const segLenSq = dx * dx + dy * dy;
      if (segLenSq === 0) {
        const ddx = ax - u.xPct;
        const ddy = ay - u.yPct;
        return ddx * ddx + ddy * ddy <= radiusPct * radiusPct;
      }
      let t = ((u.xPct - ax) * dx + (u.yPct - ay) * dy) / segLenSq;
      t = clamp(t, 0, 1);
      const px = ax + t * dx;
      const py = ay + t * dy;
      const ddx = px - u.xPct;
      const ddy = py - u.yPct;
      return ddx * ddx + ddy * ddy <= radiusPct * radiusPct;
    }

    function isShotBlocked(source, target) {
      const ax = source.xPct;
      const ay = source.yPct;
      const bx = target.xPct;
      const by = target.yPct;

      if (terrains.some((terrain) => segmentIntersectsTerrain(ax, ay, bx, by, terrain))) {
        return true;
      }

      const soldierRadiusPct = getUnitRadiusPct();
      return units.some((u) => {
        if (u.id === source.id || u.id === target.id) return false;
        return segmentIntersectsSoldier(ax, ay, bx, by, u, soldierRadiusPct);
      });
    }

    function renderThreatPreview() {
      threatLayer.innerHTML = "";
      if (!threatPreview) return;
      const source = findUnit(threatPreview.unitId);
      if (!source) return;
      const enemies = units.filter((u) => u.team !== source.team);
      for (const enemy of enemies) {
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", String(source.xPct));
        line.setAttribute("y1", String(source.yPct));
        line.setAttribute("x2", String(enemy.xPct));
        line.setAttribute("y2", String(enemy.yPct));
        line.setAttribute("stroke", "#111");
        line.setAttribute("stroke-width", "0.42");
        line.setAttribute("stroke-linecap", "round");
        threatLayer.appendChild(line);
      }
    }

    function renderLos() {
      if (!losState) {
        losLine.setAttribute("visibility", "hidden");
        return;
      }
      const u = findUnit(losState.unitId);
      if (!u) {
        losState = null;
        losLine.setAttribute("visibility", "hidden");
        return;
      }
      losLine.setAttribute("x1", String(u.xPct));
      losLine.setAttribute("y1", String(u.yPct));
      losLine.setAttribute("x2", String(losState.xPct));
      losLine.setAttribute("y2", String(losState.yPct));
      losLine.setAttribute("visibility", "visible");
    }

    function updateTurnPill() {
      turnPill.textContent = `Turn: Player ${currentTurn}`;
      turnPill.className = `pill ${currentTurn === "A" ? "team-a" : "team-b"}`;
    }

    function findUnit(id) {
      return units.find((u) => u.id === id);
    }

    function findTerrain(id) {
      return terrains.find((t) => t.id === id);
    }

    function findEntity(type, id) {
      return type === "unit" ? findUnit(id) : findTerrain(id);
    }

    function updateSelectedInfo() {
      const entity = findEntity(selectedType, selectedId);
      if (!entity) {
        selectedInfo.textContent = "No unit or terrain selected.";
        return;
      }
      if (selectedType === "unit") {
        const u = entity;
        const teamName = u.team === "A" ? "Player A" : "Player B";
        selectedInfo.innerHTML = `
          <strong>${u.id}</strong> (${teamName})<br>
          Position: ${u.xPct.toFixed(1)}%, ${u.yPct.toFixed(1)}%<br>
          State: ${u.lying ? "Lying (knocked down)" : "Standing"}<br>
          Rotation: ${u.rotation}deg
        `;
      } else {
        const t = entity;
        selectedInfo.innerHTML = `
          <strong>${t.id}</strong> (Terrain: ${t.type})<br>
          Position: ${t.xPct.toFixed(1)}%, ${t.yPct.toFixed(1)}%<br>
          Rotation: ${t.rotation}deg<br>
          Size: ${t.wPct.toFixed(1)}% x ${t.hPct.toFixed(1)}%
        `;
      }
    }

    function boardPctFromEvent(e) {
      const r = board.getBoundingClientRect();
      const x = ((e.clientX - r.left) / r.width) * 100;
      const y = ((e.clientY - r.top) / r.height) * 100;
      return { xPct: clamp(x, 2, 98), yPct: clamp(y, 2, 98) };
    }

    function startLosFromUnit(unitId, e) {
      const u = findUnit(unitId);
      if (!u) return;
      const p = boardPctFromEvent(e);
      losState = { unitId: u.id, xPct: p.xPct, yPct: p.yPct };
      selectedType = "unit";
      selectedId = u.id;
      log(`Line-of-sight started from ${u.id}.`);
      render();
    }

    function unitFromEvent(e) {
      const unitEl = e.target.closest(".unit");
      if (unitEl) return findUnit(unitEl.dataset.id);
      const p = boardPctFromEvent(e);
      return units.find((u) => Math.abs(u.xPct - p.xPct) <= 3 && Math.abs(u.yPct - p.yPct) <= 3) || null;
    }

    board.addEventListener("pointerdown", (e) => {
      if (e.button === 2) {
        const unitEl = e.target.closest(".unit");
        if (!unitEl) return;
        e.preventDefault();
        startLosFromUnit(unitEl.dataset.id, e);
        return;
      }
      if (e.button !== 0) return;
      const handle = e.target.closest(".resize-handle");
      if (handle) return;
      const target = e.target.closest(".unit, .terrain");
      if (!target) return;
      const id = target.dataset.id;
      const type = target.dataset.type;
      selectedId = id;
      selectedType = type;
      const entity = findEntity(type, id);
      dragState = { id, type, pointerId: e.pointerId };
      threatPreview = type === "unit" ? { unitId: id } : null;
      if (type === "unit" && entity) {
        dragState.startXPct = entity.xPct;
        dragState.startYPct = entity.yPct;
        moveReadout.style.display = "block";
        moveReadout.textContent = "Moved: 0.0 cm";
        moveReadout.style.left = `${entity.xPct}%`;
        moveReadout.style.top = `${clamp(entity.yPct + 6, 4, 96)}%`;
      } else {
        moveReadout.style.display = "none";
      }
      target.classList.add("dragging");
      board.setPointerCapture(e.pointerId);
      if (entity) log(`Selected ${entity.id}.`);
      render();
    });

    board.addEventListener("pointermove", (e) => {
      if (losState) {
        const p = boardPctFromEvent(e);
        losState.xPct = p.xPct;
        losState.yPct = p.yPct;
        renderLos();
      }
      if (resizeState && resizeState.pointerId === e.pointerId) {
        const t = findTerrain(resizeState.id);
        if (!t) return;
        const r = board.getBoundingClientRect();
        const dxPct = ((e.clientX - resizeState.startClientX) / r.width) * 100;
        const dyPct = ((e.clientY - resizeState.startClientY) / r.height) * 100;
        const minWPct = 4;
        const minHPct = 3;
        const maxWPct = 40;
        const maxHPct = 40;
        let w = resizeState.startW;
        let h = resizeState.startH;
        let x = resizeState.startX;
        let y = resizeState.startY;
        if (resizeState.edge === "e") {
          w = clamp(resizeState.startW + dxPct, minWPct, maxWPct);
          x = resizeState.startX + (w - resizeState.startW) / 2;
        } else if (resizeState.edge === "w") {
          w = clamp(resizeState.startW - dxPct, minWPct, maxWPct);
          x = resizeState.startX + (resizeState.startW - w) / 2;
        } else if (resizeState.edge === "s") {
          h = clamp(resizeState.startH + dyPct, minHPct, maxHPct);
          y = resizeState.startY + (h - resizeState.startH) / 2;
        } else if (resizeState.edge === "n") {
          h = clamp(resizeState.startH - dyPct, minHPct, maxHPct);
          y = resizeState.startY + (resizeState.startH - h) / 2;
        }
        t.wPct = w;
        t.hPct = h;
        t.xPct = clamp(x, w / 2, 100 - w / 2);
        t.yPct = clamp(y, h / 2, 100 - h / 2);
        render();
        return;
      }
      if (!dragState || dragState.pointerId !== e.pointerId) return;
      const entity = findEntity(dragState.type, dragState.id);
      if (!entity) return;
      const p = boardPctFromEvent(e);
      entity.xPct = p.xPct;
      entity.yPct = p.yPct;
      if (dragState.type === "unit") {
        const dxCm = (entity.xPct - dragState.startXPct) * 0.5;
        const dyCm = (entity.yPct - dragState.startYPct) * 0.5;
        const distCm = Math.sqrt(dxCm * dxCm + dyCm * dyCm);
        moveReadout.style.display = "block";
        moveReadout.textContent = `Moved: ${distCm.toFixed(1)} cm`;
        moveReadout.style.left = `${entity.xPct}%`;
        moveReadout.style.top = `${clamp(entity.yPct + 6, 4, 96)}%`;
      }
      render();
    });

    board.addEventListener("pointerup", (e) => {
      const clearThreatPreview = e.button === 0 && threatPreview;
      if (clearThreatPreview) threatPreview = null;
      if (e.button === 2 && losState) {
        log(`Stopped line-of-sight from ${losState.unitId}.`);
        losState = null;
        renderLos();
        return;
      }
      if (resizeState && resizeState.pointerId === e.pointerId) {
        const t = findTerrain(resizeState.id);
        if (t) log(`Resized ${t.id} to ${t.wPct.toFixed(1)}% x ${t.hPct.toFixed(1)}%.`);
        resizeState = null;
        render();
        return;
      }
      if (!dragState || dragState.pointerId !== e.pointerId) {
        if (clearThreatPreview) render();
        return;
      }
      const entity = findEntity(dragState.type, dragState.id);
      if (entity && dragState.type === "terrain") {
        const trayRect = terrainTray.getBoundingClientRect();
        const droppedInTray = e.clientX >= trayRect.left && e.clientX <= trayRect.right && e.clientY >= trayRect.top && e.clientY <= trayRect.bottom;
        if (droppedInTray) {
          terrains = terrains.filter((x) => x.id !== entity.id);
          if (selectedType === "terrain" && selectedId === entity.id) selectedId = null;
          log(`Removed terrain ${entity.id}.`);
          dragState = null;
          moveReadout.style.display = "none";
          render();
          return;
        }
      }
      if (entity) log(`Moved ${entity.id} to ${entity.xPct.toFixed(1)}%, ${entity.yPct.toFixed(1)}%.`);
      dragState = null;
      moveReadout.style.display = "none";
      render();
    });

    board.addEventListener("pointerdown", (e) => {
      if (e.button !== 0) return;
      const handle = e.target.closest(".resize-handle");
      if (!handle) return;
      const terrainEl = handle.closest(".terrain");
      if (!terrainEl) return;
      const t = findTerrain(terrainEl.dataset.id);
      if (!t) return;
      e.preventDefault();
      e.stopPropagation();
      selectedType = "terrain";
      selectedId = t.id;
      resizeState = {
        id: t.id,
        edge: handle.dataset.edge,
        pointerId: e.pointerId,
        startClientX: e.clientX,
        startClientY: e.clientY,
        startW: t.wPct,
        startH: t.hPct,
        startX: t.xPct,
        startY: t.yPct
      };
      board.setPointerCapture(e.pointerId);
      render();
    });

    board.addEventListener("pointerover", (e) => {
      const target = e.target.closest(".unit, .terrain");
      if (!target) return;
      hovered = { type: target.dataset.type, id: target.dataset.id };
    });

    board.addEventListener("pointerout", (e) => {
      const target = e.target.closest(".unit, .terrain");
      if (!target || !hovered) return;
      if (hovered.id === target.dataset.id && hovered.type === target.dataset.type) hovered = null;
    });

    board.addEventListener("contextmenu", (e) => {
      e.preventDefault();
    });

    board.addEventListener("dblclick", (e) => {
      const u = unitFromEvent(e);
      if (!u) return;
      u.lying = !u.lying;
      selectedType = "unit";
      selectedId = u.id;
      log(`${u.id} is now ${u.lying ? "down" : "standing"}.`);
      render();
    });

    function toggleSelectedLying() {
      const u = findUnit(selectedId);
      if (!u || selectedType !== "unit") return;
      u.lying = !u.lying;
      log(`${u.id} is now ${u.lying ? "lying" : "standing"}.`);
      render();
    }

    function deleteSelected() {
      if (selectedType === "unit") {
        const u = findUnit(selectedId);
        if (!u) return;
        units = units.filter((x) => x.id !== selectedId);
        log(`Deleted ${u.id}.`);
      } else {
        const t = findTerrain(selectedId);
        if (!t) return;
        terrains = terrains.filter((x) => x.id !== selectedId);
        log(`Deleted terrain ${t.id}.`);
      }
      selectedId = null;
      render();
    }

    function rotateEntity(type, id, deltaDeg) {
      const entity = findEntity(type, id);
      if (!entity) return;
      entity.rotation = ((entity.rotation + deltaDeg) % 360 + 360) % 360;
      render();
    }

    function rollDice(count) {
      const rolls = Array.from({ length: count }, () => 1 + Math.floor(Math.random() * 6));
      diceTray.innerHTML = "";
      for (const r of rolls) {
        const d = document.createElement("div");
        d.className = "die";
        d.textContent = String(r);
        diceTray.appendChild(d);
      }
      log(`Rolled ${count}d6: [${rolls.join(", ")}]`);
    }

    function setShootPreset() {
      let dice = 1;
      if (document.getElementById("closeRange").checked) dice += 1;
      if (document.getElementById("openShot").checked) dice += 1;
      if (document.getElementById("supportFire").checked) dice += 1;
      diceCountInput.value = dice;
      hitOnSelect.value = "5";
      log(`Shoot preset: ${dice} dice (5+ to hit).`);
    }

    function setHealPreset() {
      let dice = 1;
      if (document.getElementById("hiddenHeal").checked) dice += 1;
      diceCountInput.value = dice;
      hitOnSelect.value = "5";
      log(`Heal preset: ${dice} dice (5+ to heal).`);
    }

    document.getElementById("toggleLyingBtn").addEventListener("click", toggleSelectedLying);
    document.getElementById("deleteUnitBtn").addEventListener("click", deleteSelected);
    document.getElementById("addA").addEventListener("click", () => createUnit("A", 50, 92));
    document.getElementById("addB").addEventListener("click", () => createUnit("B", 50, 8));

    document.getElementById("setupBtn").addEventListener("click", setupDefault);
    document.getElementById("clearBtn").addEventListener("click", () => {
      units = [];
      terrains = [];
      selectedId = null;
      nextUnitNumber = { A: 1, B: 1 };
      nextTerrainId = 1;
      render();
      log("Cleared all units and terrain.");
    });

    document.getElementById("nextTurnBtn").addEventListener("click", () => {
      currentTurn = currentTurn === "A" ? "B" : "A";
      render();
      log(`Now Player ${currentTurn}'s turn.`);
    });

    document.getElementById("rollBtn").addEventListener("click", () => {
      const c = clamp(Number(diceCountInput.value) || 1, 1, 10);
      diceCountInput.value = c;
      rollDice(c);
    });
    document.getElementById("presetShootBtn").addEventListener("click", setShootPreset);
    document.getElementById("presetHealBtn").addEventListener("click", setHealPreset);
    roll1Btn.addEventListener("click", () => rollDice(1));
    roll2Btn.addEventListener("click", () => rollDice(2));

    board.addEventListener("wheel", (e) => {
      const target = e.target.closest(".unit, .terrain");
      const focus = target ? { type: target.dataset.type, id: target.dataset.id } : hovered;
      if (!focus) return;
      e.preventDefault();
      rotateEntity(focus.type, focus.id, e.deltaY > 0 ? 10 : -10);
    }, { passive: false });

    terrainTray.addEventListener("dragstart", (e) => {
      const chip = e.target.closest(".terrain-chip");
      if (!chip) return;
      e.dataTransfer.setData("text/plain", chip.dataset.terrainType);
    });

    terrainTray.querySelectorAll(".terrain-chip").forEach((chip) => {
      chip.setAttribute("draggable", "true");
    });

    board.addEventListener("dragover", (e) => {
      e.preventDefault();
    });

    board.addEventListener("drop", (e) => {
      e.preventDefault();
      const type = e.dataTransfer.getData("text/plain");
      if (!type) return;
      const p = boardPctFromEvent(e);
      createTerrain(type, p.xPct, p.yPct, 0);
    });

    window.addEventListener("keydown", (e) => {
      if (e.key.toLowerCase() === "l") toggleSelectedLying();
      if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
        const focus = hovered || (selectedId ? { type: selectedType, id: selectedId } : null);
        if (focus) {
          e.preventDefault();
          rotateEntity(focus.type, focus.id, e.key === "ArrowLeft" ? -10 : 10);
        }
      }
      if (e.key === "Delete" || e.key === "Backspace") deleteSelected();
    });

    setupDefault();
  </script>
</body>
</html>
